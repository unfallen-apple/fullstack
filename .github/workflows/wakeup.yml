# Cloudtype의 무료 플랜의 경우 매일 03시~09시 사이에 서버가 자동으로 중지됩니다. 
#이 워크플로우는 매일 한국시간 07시와 09시에 서버를 깨우도록 설정되어 있습니다. 
#또한, 수동으로도 실행할 수 있도록 workflow_dispatch 이벤트도 포함되어 있습니다.

name: Wake up Cloudtype Server (Deploy Macro)

on:
  schedule:
    - cron: '5 22,0 * * *'
  workflow_dispatch:

jobs:
  wakeup-and-deploy:  
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect repository to Cloudtype
        uses: cloudtype-github-actions/connect@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          ghtoken: ${{ secrets.GHP_TOKEN }}

      - name: Deploy to Cloudtype with Full Config
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: "@fastjjune/kimjunyoung"
          stage: main
          yaml: |
            name: kimjunyoung
            app: java@21
            resources:
              spot: true
              memory: 0.5
            context:
              git:
                url: https://github.com/${{ github.repository }}.git
                branch: main
                path: ./demo
            options:
              ports: "8080"
              build: ./gradlew build -x test
              start: java -jar build/libs/*.jar
              healthz: /actuator/health
              env:
                
                - name: DB_PASSWORD
                  value: ${{ secrets.DB_PASSWORD }}
                - name: DB_USER
                  value: ${{ secrets.DB_USER }}
                - name: SUPABASE_URL
                  value: ${{ secrets.SUPABASE_URL }}
                - name: SUPABASE_KEY
                  value: ${{ secrets.SUPABASE_KEY }}
                - name: SUPABASE_BUCKET
                  value: uploads
                - name: FRONTEND_URL
                  value: "https://junyoungkim.vercel.app"
                - name: JDBC_DATABASE_URL
                  value: "jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0"
                - name: SPRING_PROFILES_ACTIVE
                  value: "prod"