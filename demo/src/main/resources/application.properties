############################################################
# Database / Production-ready settings (Postgres / Supabase)
#+ Use environment variables in Render / production. Do NOT hardcode credentials.
############################################################

# Server bind and port (Render sets PORT environment variable)
server.port=${PORT:8080}
server.address=0.0.0.0

# JDBC URL: prefer setting full JDBC URL in env var `JDBC_DATABASE_URL`.
# Example (Supabase/Postgres with SSL):
# JDBC_DATABASE_URL=jdbc:postgresql://db.abcd.supabase.co:5432/postgres?sslmode=require

# If you prefer granular env vars, set DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
# and use the fallback construction below.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:portfolio}}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connection pool (HikariCP defaults are OK, adjust if needed)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}

# Multipart (file upload) limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Recommended: set SPRING_PROFILES_ACTIVE=prod on production

# Actuator (health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true